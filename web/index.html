<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CryptoChat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0a0a0f;--sidebar:#111118;--sidebar2:#16161f;
    --accent:#7c5cfc;--accent2:#5b3de8;--accent3:#a78bfa;
    --surface:#1e1e2e;--surface2:#252535;--surface3:#2d2d42;
    --text:#e8e8f0;--text2:#9999b8;--text3:#6666a0;
    --green:#22d07a;--red:#ff4f6a;--yellow:#ffd166;
    --border:#2a2a3e;--msg-in:#1e1e2e;--msg-out:#4a2dcc;
    --radius:18px;--rsmall:10px;
    --shadow:0 8px 32px rgba(0,0,0,0.4);
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;}

  /* ── Auth screen ─────────────────────────────────────────── */
  #auth-screen{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#0a0a0f 0%,#0e0a1e 50%,#0a0f18 100%);
    z-index:100;
  }
  .auth-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:24px;padding:40px;width:420px;
    box-shadow:0 24px 80px rgba(124,92,252,0.2),var(--shadow);
  }
  .auth-logo{
    text-align:center;margin-bottom:32px;
  }
  .auth-logo .logo-icon{
    width:64px;height:64px;border-radius:20px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:inline-flex;align-items:center;justify-content:center;
    font-size:28px;margin-bottom:12px;
    box-shadow:0 8px 24px rgba(124,92,252,0.4);
  }
  .auth-logo h1{font-size:24px;font-weight:700;color:var(--text);}
  .auth-logo p{font-size:13px;color:var(--text2);margin-top:4px;}
  .auth-tabs{display:flex;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:28px;}
  .auth-tab{
    flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:9px;
    font-size:14px;font-weight:500;color:var(--text2);transition:all .2s;
  }
  .auth-tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(124,92,252,0.4);}
  .form-group{margin-bottom:16px;}
  .form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
  .form-input{
    width:100%;padding:12px 16px;background:var(--surface2);
    border:1px solid var(--border);border-radius:12px;
    color:var(--text);font-size:14px;outline:none;transition:all .2s;
    font-family:inherit;
  }
  .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.15);}
  .form-input::placeholder{color:var(--text3);}
  .pass-wrap{position:relative;}
  .pass-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    cursor:pointer;color:var(--text3);font-size:18px;user-select:none;
    transition:color .2s;
  }
  .pass-toggle:hover{color:var(--accent3);}
  .btn-primary{
    width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;
    cursor:pointer;transition:all .2s;font-family:inherit;margin-top:4px;
    box-shadow:0 4px 16px rgba(124,92,252,0.35);
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,92,252,0.45);}
  .btn-primary:active{transform:translateY(0);}
  .auth-msg{margin-top:12px;text-align:center;font-size:13px;padding:8px;border-radius:8px;}
  .auth-msg.ok{color:var(--green);background:rgba(34,208,122,0.08);}
  .auth-msg.err{color:var(--red);background:rgba(255,79,106,0.08);}

  /* ── App layout ──────────────────────────────────────────── */
  #app{display:none;width:100%;height:100vh;flex-direction:row;}
  #app.show{display:flex;}

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar{
    width:320px;min-width:280px;background:var(--sidebar);
    border-right:1px solid var(--border);display:flex;flex-direction:column;
    flex-shrink:0;
  }
  .sidebar-header{
    padding:20px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:12px;
  }
  .user-avatar{
    width:40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;color:#fff;flex-shrink:0;
  }
  .user-info{flex:1;}
  .user-name{font-weight:600;font-size:14px;}
  .user-status{font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px;}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  .icon-btn{
    width:36px;height:36px;border-radius:10px;background:var(--surface2);
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:var(--text2);font-size:18px;transition:all .2s;
  }
  .icon-btn:hover{background:var(--surface3);color:var(--text);}

  .search-box{padding:12px 16px;border-bottom:1px solid var(--border);}
  .search-input{
    width:100%;padding:9px 14px;background:var(--surface2);
    border:1px solid var(--border);border-radius:12px;
    color:var(--text);font-size:13px;outline:none;
    font-family:inherit;transition:all .2s;
  }
  .search-input:focus{border-color:var(--accent);}

  .tabs-row{
    display:flex;padding:12px 16px 8px;gap:8px;
    border-bottom:1px solid var(--border);
  }
  .tab-btn{
    padding:6px 14px;border-radius:20px;border:none;cursor:pointer;
    font-size:12px;font-weight:600;font-family:inherit;transition:all .2s;
    background:var(--surface2);color:var(--text2);
  }
  .tab-btn.active{background:var(--accent);color:#fff;}

  .conv-list{flex:1;overflow-y:auto;padding:8px;}
  .conv-list::-webkit-scrollbar{width:4px;}
  .conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .conv-item{
    display:flex;align-items:center;gap:12px;padding:12px;
    border-radius:14px;cursor:pointer;transition:all .2s;position:relative;
  }
  .conv-item:hover{background:var(--surface2);}
  .conv-item.active{background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(91,61,232,.1));
    border:1px solid rgba(124,92,252,.2);}
  .conv-avatar{
    width:46px;height:46px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;
    position:relative;
  }
  .conv-avatar.group{border-radius:14px;}
  .conv-online{
    position:absolute;bottom:1px;right:1px;width:11px;height:11px;
    background:var(--green);border-radius:50%;border:2px solid var(--sidebar);
  }
  .conv-body{flex:1;min-width:0;}
  .conv-name{font-weight:600;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .conv-time{font-size:11px;color:var(--text3);}
  .conv-badge{
    background:var(--accent);color:#fff;border-radius:10px;
    padding:2px 7px;font-size:11px;font-weight:600;min-width:18px;text-align:center;
  }

  .sidebar-footer{
    padding:12px 16px;border-top:1px solid var(--border);
    display:flex;flex-direction:column;gap:8px;
  }
  .new-room-row{display:flex;gap:8px;}
  .new-room-input{
    flex:1;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;
  }
  .new-room-input:focus{border-color:var(--accent);}
  .btn-small{
    padding:9px 14px;background:var(--accent);border:none;border-radius:10px;
    color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
    white-space:nowrap;transition:all .2s;
  }
  .btn-small:hover{background:var(--accent2);}
  .btn-small.outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
  .btn-small.outline:hover{border-color:var(--accent);color:var(--accent);}

  /* ── Chat area ───────────────────────────────────────────── */
  .chat-area{
    flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0;
  }
  .chat-header{
    padding:16px 24px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:14px;background:var(--sidebar);
  }
  .chat-header-info{flex:1;}
  .chat-title{font-weight:700;font-size:16px;}
  .chat-subtitle{font-size:12px;color:var(--text2);}
  .chat-actions{display:flex;gap:8px;}
  .header-badge{
    padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
    background:rgba(124,92,252,.15);color:var(--accent3);border:1px solid rgba(124,92,252,.2);
  }

  .messages-wrap{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:4px;}
  .messages-wrap::-webkit-scrollbar{width:4px;}
  .messages-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .msg-group{margin-bottom:16px;}
  .msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:3px;}
  .msg-row.out{flex-direction:row-reverse;}
  .msg-avatar{
    width:28px;height:28px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;
  }
  .msg-bubble{
    max-width:65%;padding:10px 14px;border-radius:var(--radius);
    font-size:14px;line-height:1.5;word-break:break-word;position:relative;
  }
  .msg-row.in .msg-bubble{
    background:var(--msg-in);border:1px solid var(--border);
    border-bottom-left-radius:4px;color:var(--text);
  }
  .msg-row.out .msg-bubble{
    background:var(--msg-out);border-bottom-right-radius:4px;color:#fff;
  }
  .msg-sender{font-size:11px;color:var(--text3);margin-bottom:3px;padding-left:36px;}
  .msg-time{font-size:10px;color:rgba(255,255,255,0.4);text-align:right;margin-top:3px;}
  .msg-row.in .msg-time{color:var(--text3);}
  .msg-encrypted{
    font-size:10px;color:rgba(255,255,255,.35);font-family:monospace;
    margin-top:4px;word-break:break-all;
  }

  .system-msg{
    text-align:center;margin:12px 0;
  }
  .system-msg span{
    font-size:12px;color:var(--text3);background:var(--surface);
    padding:4px 14px;border-radius:20px;border:1px solid var(--border);
  }

  /* empty state */
  .empty-chat{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--text2);
  }
  .empty-icon{font-size:64px;margin-bottom:16px;opacity:.3;}
  .empty-title{font-size:18px;font-weight:600;color:var(--text3);margin-bottom:8px;}
  .empty-sub{font-size:14px;color:var(--text3);}

  /* input area */
  .input-area{
    padding:16px 24px;border-top:1px solid var(--border);background:var(--sidebar);
  }
  .input-row{
    display:flex;align-items:flex-end;gap:10px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:24px;padding:8px 8px 8px 16px;
    transition:border-color .2s;
  }
  .input-row:focus-within{border-color:var(--accent);}
  #msg-input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--text);font-size:14px;font-family:inherit;
    resize:none;max-height:120px;line-height:1.5;
    padding:4px 0;
  }
  #msg-input::placeholder{color:var(--text3);}
  .send-btn{
    width:40px;height:40px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:18px;transition:all .2s;flex-shrink:0;
  }
  .send-btn:hover{transform:scale(1.05);}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .crypto-info{
    display:flex;align-items:center;gap:6px;margin-top:8px;padding:6px 12px;
    background:rgba(124,92,252,.07);border-radius:8px;
    font-size:11px;color:var(--text3);
  }
  .crypto-icon{color:var(--accent3);font-size:13px;}

  /* ── Notification toast ──────────────────────────────────── */
  #toast{
    position:fixed;bottom:24px;right:24px;z-index:999;
    display:flex;flex-direction:column;gap:8px;
  }
  .toast-item{
    background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:12px 16px;min-width:260px;max-width:340px;
    box-shadow:var(--shadow);animation:slideIn .3s ease;
    display:flex;align-items:flex-start;gap:10px;
  }
  .toast-item.ok{border-left:3px solid var(--green);}
  .toast-item.err{border-left:3px solid var(--red);}
  .toast-item.info{border-left:3px solid var(--accent3);}
  .toast-icon{font-size:18px;flex-shrink:0;}
  .toast-body{}
  .toast-title{font-size:13px;font-weight:600;margin-bottom:2px;}
  .toast-msg{font-size:12px;color:var(--text2);}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

  /* ── Responsive ──────────────────────────────────────────── */
  @media(max-width:640px){.sidebar{width:100%;position:absolute;z-index:10;}
    .sidebar.hidden{display:none;} .chat-area.full{display:flex;}}
</style>
</head>
<body>

<!-- ── AUTH SCREEN ─────────────────────────────────────── -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🔐</div>
      <h1>CryptoChat</h1>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Đăng nhập</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Đăng ký</div>
    </div>

    <!-- Login form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Tên đăng nhập</label>
        <input class="form-input" id="login-user" placeholder="Nhập username..." autocomplete="off" onkeydown="authKeydown(event)"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <div class="pass-wrap">
          <input class="form-input" id="login-pass" type="password" placeholder="Nhập mật khẩu..." onkeydown="authKeydown(event)"/>
          <span class="pass-toggle" onclick="togglePass('login-pass',this)">👁</span>
        </div>
      </div>
      <button class="btn-primary" onclick="doLogin()">Đăng nhập</button>
      <div id="login-msg" class="auth-msg" style="display:none"></div>
    </div>

    <!-- Register form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label">Tên đăng nhập</label>
        <input class="form-input" id="reg-user" placeholder="Nhập username..." autocomplete="off" onkeydown="authKeydown(event)"/>
      </div>
      <div class="form-group">
        <label class="form-label">Mật khẩu</label>
        <div class="pass-wrap">
          <input class="form-input" id="reg-pass" type="password" placeholder="Nhập mật khẩu..." onkeydown="authKeydown(event)"/>
          <span class="pass-toggle" onclick="togglePass('reg-pass',this)">👁</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Xác nhận mật khẩu</label>
        <div class="pass-wrap">
          <input class="form-input" id="reg-pass2" type="password" placeholder="Nhập lại mật khẩu..." onkeydown="authKeydown(event)"/>
          <span class="pass-toggle" onclick="togglePass('reg-pass2',this)">👁</span>
        </div>
      </div>
      <button class="btn-primary" onclick="doRegister()">Đăng ký</button>
      <div id="reg-msg" class="auth-msg" style="display:none"></div>
    </div>
  </div>
</div>

<!-- ── APP ─────────────────────────────────────────────── -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="user-avatar" id="my-avatar">U</div>
      <div class="user-info">
        <div class="user-name" id="my-username">User</div>
        <div class="user-status"><span class="status-dot"></span>Online</div>
      </div>
      <button class="icon-btn" onclick="doLogout()" title="Đăng xuất">🚪</button>
    </div>

    <div class="tabs-row">
      <button class="tab-btn active" id="tab-dm" onclick="setListTab('dm')">💬 Tin nhắn</button>
      <button class="tab-btn" id="tab-group" onclick="setListTab('group')">👥 Nhóm</button>
      <button class="tab-btn" id="tab-users" onclick="setListTab('users')">🟢 Online</button>
    </div>

    <div class="conv-list" id="conv-list"></div>

    <div class="sidebar-footer">
      <div class="new-room-row">
        <input class="new-room-input" id="new-room-name" placeholder="Tên nhóm mới..."/>
        <button class="btn-small" onclick="createRoom()">+ Tạo</button>
      </div>
      <div class="new-room-row">
        <input class="new-room-input" id="dm-target" placeholder="Username để nhắn riêng..."/>
        <button class="btn-small outline" onclick="startDM()">Chat</button>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <!-- Empty state -->
    <div class="empty-chat" id="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Chọn cuộc trò chuyện</div>
      <div class="empty-sub">Chọn người dùng hoặc nhóm để bắt đầu nhắn tin</div>
    </div>

    <!-- Chat view -->
    <div id="chat-view" style="display:none;flex:1;display:none;flex-direction:column;height:100%;">
      <div class="chat-header">
        <div class="conv-avatar" id="chat-avatar" style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7c5cfc,#5b3de8);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;"></div>
        <div class="chat-header-info">
          <div class="chat-title" id="chat-title">—</div>
          <div class="chat-subtitle" id="chat-subtitle">Chọn cuộc trò chuyện</div>
        </div>
        <div class="chat-actions">
          <span class="header-badge"> </span>
        </div>
      </div>

      <div class="messages-wrap" id="messages"></div>

      <div class="input-area">
        <div class="input-row">
          <textarea id="msg-input" rows="1" placeholder="Nhập tin nhắn..." onkeydown="handleKey(event)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>➤</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────
let socket = null;
let myUsername = '';
let myToken    = '';
let activeChat = null;   // { name, type:'dm'|'group' }
let conversations = {};  // name -> { messages:[], unread:0, type }
let onlineUsers  = [];
let roomList     = [];
let joinedRooms  = new Set();
let listTab      = 'dm';

// ── Substitution cipher (mirror of server) ─────────────────
const SUBST = [73,14,61,37,88,22,51,79,4,43,92,18,65,30,84,11,56,70,2,47,91,25,63,38,82,17,54,78,8,41,90,20,67,33,86,13,58,72,6,45,94,27,60,36,80,15,52,76,10,39,89,23,62,34,85,19,55,71,3,44,93,28,64,32,83,16,53,77,9,40,87,21,66,31,81,12,57,75,7,42,0,26,59,35,87%95,24,50,74,5,46,1,29,68,48,0];
const REV   = new Array(95).fill(0);
SUBST.forEach((v,i)=>REV[v]=i);

function substEncrypt(text,key=42){
  return text.split('').map(c=>{
    const o=c.charCodeAt(0);
    if(o>=32&&o<=126){const idx=((o-32)+key)%95;return String.fromCharCode(SUBST[idx]+32);}
    return c;
  }).join('');
}
function substDecrypt(text,key=42){
  return text.split('').map(c=>{
    const o=c.charCodeAt(0);
    if(o>=32&&o<=126){const rev=REV[o-32];const idx=((rev-key)%95+95)%95;return String.fromCharCode(idx+32);}
    return c;
  }).join('');
}

// ── Connect ────────────────────────────────────────────────
function connectSocket(){
  socket = io();
  socket.on('connect',()=>console.log('[WS] connected'));
  socket.on('connected',()=>console.log('[WS] C server connected'));
  socket.on('server_response', onServerResponse);
  socket.on('server_error',    onServerError);
  socket.on('message',         onMessage);
  socket.on('disconnect',()=>toast('Mất kết nối','Đang kết nối lại...','err'));
}

// ── Auth helpers ───────────────────────────────────────────
function switchTab(t){
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-register').classList.toggle('active', t==='register');
  document.getElementById('form-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('form-register').style.display = t==='register' ? '' : 'none';
}
function authKeydown(event){
  if(event.key === 'Enter'){
    event.preventDefault();
    if(document.getElementById('tab-login').classList.contains('active')) doLogin();
    else doRegister();
  }
}
function togglePass(id,btn){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'👁':'🙈';
}
function showAuthMsg(id,msg,ok){
  const el=document.getElementById(id);
  el.style.display=''; el.className='auth-msg '+(ok?'ok':'err');
  el.textContent=msg;
  setTimeout(()=>el.style.display='none',4000);
}

function doRegister(){
  const u=document.getElementById('reg-user').value.trim();
  const p=document.getElementById('reg-pass').value;
  const p2=document.getElementById('reg-pass2').value;
  if(!u||!p){showAuthMsg('reg-msg','Vui lòng điền đủ thông tin',false);return;}
  if(p!==p2){showAuthMsg('reg-msg','Mật khẩu không khớp',false);return;}
  if(u.length<3){showAuthMsg('reg-msg','Username tối thiểu 3 ký tự',false);return;}
  socket.emit('register',{username:u,password:p});
}

function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  if(!u||!p){showAuthMsg('login-msg','Vui lòng điền đủ thông tin',false);return;}
  socket.emit('login',{username:u,password:p});
}

function doLogout(){
  if(!confirm('Đăng xuất?')) return;
  socket.emit('logout',{});
  setTimeout(()=>location.reload(),500);
}

// ── Server response handlers ───────────────────────────────
function onServerResponse(pkt){
  const extra   = pkt.extra   || '';
  const content = pkt.content || '';

  // login success
  if(content==='logged_in'){
    myUsername = document.getElementById('login-user').value.trim();
    myToken    = pkt.token || '';
    socket.emit('update_token',{token:myToken});
    loadConversations();
    enterApp();
    return;
  }
  // register success
  if(content==='registered'){
    showAuthMsg('reg-msg','✅ Đăng ký thành công! Hãy đăng nhập.', true);
    setTimeout(()=>switchTab('login'),1500);
    return;
  }
  if(content==='room_created'){ toast('Tạo nhóm','Tạo nhóm thành công!','ok'); refreshLists(); return; }
  if(content==='joined_room') { toast('Nhóm','Đã vào nhóm!','ok'); refreshLists(); return; }
  if(content==='left_room')   { toast('Nhóm','Đã rời nhóm','info'); refreshLists(); return; }

  // list users
  if(extra==='users'){
    try{
      // content có thể là array object hoặc string, tùy theo gateway
      onlineUsers = Array.isArray(content) ? content : JSON.parse(content);
      onlineUsers = onlineUsers.filter(u=>u!==myUsername);
      console.log('[Users]', onlineUsers);
      if(listTab==='users') renderConvList();
    } catch(e){ console.error('[Error parsing users]', e); }
    return;
  }
  // list rooms
  if(extra==='rooms'){
    try{
      roomList = Array.isArray(content) ? content : JSON.parse(content);
      console.log('[Rooms]', roomList);
      if(listTab==='group') renderConvList();
    } catch(e){ console.error('[Error parsing rooms]', e); }
    return;
  }
}

function onServerError(pkt){
  const m=pkt.content||'Lỗi không xác định';
  if(m==='wrong_password')   { showAuthMsg('login-msg','❌ Sai mật khẩu',false); return; }
  if(m==='user_not_found')   { showAuthMsg('login-msg','❌ Không tìm thấy tài khoản',false); return; }
  if(m==='user_exists')      { showAuthMsg('reg-msg','❌ Username đã tồn tại',false); return; }
  if(m==='user_offline')     { toast('Chat','Người dùng không online','err'); return; }
  if(m==='unauthorized')     { toast('Lỗi','Phiên đăng nhập hết hạn','err'); return; }
  toast('Lỗi',m,'err');
}

function onMessage(pkt){
  console.log('[MSG] Received:', pkt);
  const from    = pkt.from    || '';
  const to      = pkt.to      || '';
  const content = pkt.content || '';         // already decrypted by gateway
  const cipher  = pkt.encrypted_content || '';
  const ttype   = pkt.target_type || 1;
  const ts      = new Date().toLocaleTimeString('vi',{hour:'2-digit',minute:'2-digit'});
  const isMine  = from === myUsername;

  let chatKey = ttype===2 ? to : (isMine ? to : from);

  console.log('[MSG] chatKey:', chatKey, 'isMine:', isMine, 'content:', content);

  if(!conversations[chatKey])
    conversations[chatKey]={ messages:[], unread:0, type: ttype===2?'group':'dm', lastTime:ts };

  conversations[chatKey].messages.push({from,content,cipher,ts,mine:isMine});
  conversations[chatKey].lastTime = ts;
  saveConversations();

  if(activeChat && activeChat.name===chatKey){
    console.log('[MSG] Appending to active chat');
    appendMessage({from,content,cipher,ts,mine:isMine});
    scrollDown();
  } else {
    conversations[chatKey].unread = (conversations[chatKey].unread||0)+1;
    if(!isMine) toast(from, content.slice(0,60), 'info');
  }
  renderConvList();
}

// ── Enter app ──────────────────────────────────────────────
function enterApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('my-username').textContent = myUsername;
  document.getElementById('my-avatar').textContent   = myUsername[0].toUpperCase();
  refreshLists();
  setInterval(refreshLists, 2000);
}

function refreshLists(){
  if(!myToken) return;
  socket.emit('list_users',{});
  socket.emit('list_rooms',{});
}

function storageKey(){
  return `chat_history_${myUsername}`;
}

function saveConversations(){
  if(!myUsername) return;
  try{ localStorage.setItem(storageKey(), JSON.stringify(conversations)); }
  catch(e){ console.warn('[Storage] cannot save conversations', e); }
}

function loadConversations(){
  if(!myUsername) return;
  try{
    const raw = localStorage.getItem(storageKey());
    if(raw){
      const data = JSON.parse(raw);
      if(data && typeof data === 'object') conversations = data;
    }
  } catch(e){ console.warn('[Storage] cannot load conversations', e); }
}

// ── Tab switching ──────────────────────────────────────────
function setListTab(t){
  listTab=t;
  document.getElementById('tab-dm').classList.toggle('active',t==='dm');
  document.getElementById('tab-group').classList.toggle('active',t==='group');
  document.getElementById('tab-users').classList.toggle('active',t==='users');
  renderConvList();
}

// ── Render conversation list ───────────────────────────────
const COLORS=['#7c5cfc','#e84393','#22c55e','#f59e0b','#06b6d4','#ec4899','#8b5cf6'];
function colorFor(name){ let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }

function renderConvList(){
  const list=document.getElementById('conv-list');
  let html='';

  if(listTab==='users'){
    onlineUsers.forEach(u=>{
      const active=activeChat&&activeChat.name===u&&activeChat.type==='dm';
      const conv=conversations[u]||{};
      const preview=conv.messages?.slice(-1)[0]?.content||'Bắt đầu trò chuyện';
      const badge=conv.unread?`<div class="conv-badge">${conv.unread}</div>`:'';
      html+=`<div class="conv-item${active?' active':''}" onclick="openChat('${u}','dm')">
        <div class="conv-avatar" style="background:${colorFor(u)}">
          ${u[0].toUpperCase()}
          <div class="conv-online"></div>
        </div>
        <div class="conv-body">
          <div class="conv-name">${u}</div>
          <div class="conv-preview">${escHtml(preview)}</div>
        </div>
        <div class="conv-meta"><span class="conv-time">${conv.lastTime||''}</span>${badge}</div>
      </div>`;
    });
    if(!onlineUsers.length) html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">Không có người dùng online</div>';
  } else if(listTab==='group'){
    roomList.forEach(r=>{
      const active=activeChat&&activeChat.name===r&&activeChat.type==='group';
      const conv=conversations[r]||{};
      const preview=conv.messages?.slice(-1)[0]?.content||'Nhóm chat';
      const badge=conv.unread?`<div class="conv-badge">${conv.unread}</div>`:'';
      html+=`<div class="conv-item${active?' active':''}" onclick="openChat('${r}','group')">
        <div class="conv-avatar group" style="background:${colorFor(r)}">
          👥
        </div>
        <div class="conv-body">
          <div class="conv-name">${r}</div>
          <div class="conv-preview">${escHtml(preview)}</div>
        </div>
        <div class="conv-meta"><span class="conv-time">${conv.lastTime||''}</span>${badge}</div>
      </div>`;
    });
    if(!roomList.length) html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">Chưa có nhóm nào</div>';
  } else {
    // DM conversations from history
    const dmKeys=Object.keys(conversations).filter(k=>conversations[k].type==='dm');
    if(!dmKeys.length) html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">Chưa có tin nhắn nào</div>';
    dmKeys.forEach(k=>{
      const conv=conversations[k];
      const active=activeChat&&activeChat.name===k&&activeChat.type==='dm';
      const preview=conv.messages?.slice(-1)[0]?.content||'';
      const badge=conv.unread?`<div class="conv-badge">${conv.unread}</div>`:'';
      html+=`<div class="conv-item${active?' active':''}" onclick="openChat('${k}','dm')">
        <div class="conv-avatar" style="background:${colorFor(k)}">
          ${k[0].toUpperCase()}
        </div>
        <div class="conv-body">
          <div class="conv-name">${k}</div>
          <div class="conv-preview">${escHtml(preview)}</div>
        </div>
        <div class="conv-meta"><span class="conv-time">${conv.lastTime||''}</span>${badge}</div>
      </div>`;
    });
  }
  list.innerHTML=html;
}

function filterConvs(q){
  const items=document.querySelectorAll('.conv-item');
  items.forEach(el=>{
    const name=el.querySelector('.conv-name').textContent.toLowerCase();
    el.style.display=name.includes(q.toLowerCase())?'':'none';
  });
}

// ── Open chat ──────────────────────────────────────────────
function openChat(name, type){
  activeChat={name,type};
  if(!conversations[name]) conversations[name]={messages:[],unread:0,type};
  conversations[name].unread=0;
  saveConversations();

  document.getElementById('empty-state').style.display='none';
  const cv=document.getElementById('chat-view');
  cv.style.display='flex';

  document.getElementById('chat-title').textContent=name;
  document.getElementById('chat-subtitle').textContent=type==='group'?'Nhóm chat':'Tin nhắn riêng';
  document.getElementById('chat-avatar').textContent=type==='group'?'👥':name[0].toUpperCase();
  document.getElementById('chat-avatar').style.background=colorFor(name);
  document.getElementById('send-btn').disabled=false;

  // join room socket room (for future multi-tab support)
  if(type==='group' && !joinedRooms.has(name)){
    joinedRooms.add(name);
    socket.emit('join_room_req',{room:name});
  }

  // render messages
  const msgs=document.getElementById('messages');
  msgs.innerHTML='';
  (conversations[name].messages||[]).forEach(m=>appendMessage(m));
  scrollDown();
  renderConvList();
  document.getElementById('msg-input').focus();
}

function appendMessage(m){
  const msgs=document.getElementById('messages');
  const dir=m.mine?'out':'in';
  const color=colorFor(m.from);
  const showSender=activeChat&&activeChat.type==='group'&&!m.mine;

  const div=document.createElement('div');
  div.className='msg-group';
  div.innerHTML=`
    ${showSender?`<div class="msg-sender" style="color:${color}">${m.from}</div>`:''}
    <div class="msg-row ${dir}">
      ${dir==='in'?`<div class="msg-avatar" style="background:${color}">${m.from[0].toUpperCase()}</div>`:''}
      <div class="msg-bubble">
        ${escHtml(m.content)}
        <div class="msg-time">${m.ts}</div>
      </div>
    </div>`;
  msgs.appendChild(div);
}

function scrollDown(){
  const m=document.getElementById('messages');
  m.scrollTop=m.scrollHeight;
}

// ── Send message ───────────────────────────────────────────
function sendMessage(){
  if(!activeChat) return;
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text) return;
  input.value=''; input.style.height='';

  console.log('[SEND] Sending message:', text, 'to:', activeChat.name, 'type:', activeChat.type);

    socket.emit(
    'send_message',
    {
      to: activeChat.name,

      content: text,   // gửi plain text

      target_type:
        activeChat.type === 'group'
        ? 2
        : 1
    }
  );
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
  // auto-resize
  const ta=document.getElementById('msg-input');
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,120)+'px';
}

// ── Room / DM shortcuts ────────────────────────────────────
function createRoom(){
  const n=document.getElementById('new-room-name').value.trim();
  if(!n) return;
  socket.emit('create_room',{room:n});
  document.getElementById('new-room-name').value='';
  setTimeout(()=>openChat(n,'group'),600);
}

function startDM(){
  const n=document.getElementById('dm-target').value.trim();
  if(!n||n===myUsername) return;
  document.getElementById('dm-target').value='';
  openChat(n,'dm');
  setListTab('dm');
}

// ── Toast ──────────────────────────────────────────────────
function toast(title,msg,type='info'){
  const icons={ok:'✅',err:'❌',info:'💬'};
  const el=document.createElement('div');
  el.className=`toast-item ${type}`;
  el.innerHTML=`<span class="toast-icon">${icons[type]||'ℹ️'}</span>
    <div class="toast-body"><div class="toast-title">${escHtml(title)}</div>
    <div class="toast-msg">${escHtml(msg)}</div></div>`;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ───────────────────────────────────────────────────
connectSocket();
</script>
